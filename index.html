<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFDILab — Emisión & Recepción</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f4f3ef;--panel:#fff;--ink:#111;--ink2:#444;--muted:#999;
  --border:#ddd;--border2:#e8e6e0;
  --pass:#15803d;--pass-bg:#f0fdf4;--pass-bdr:#86efac;
  --fail:#b91c1c;--fail-bg:#fef2f2;--fail-bdr:#fca5a5;
  --warn:#b45309;--warn-bg:#fffbeb;--warn-bdr:#fcd34d;
  --blue:#1d4ed8;--blue-bg:#eff6ff;
  --accent:#d97706;--accent2:#0369a1;
  --mono:'Geist Mono',monospace;--serif:'Instrument Serif',serif;
}
html{font-size:13px;}
body{background:var(--bg);color:var(--ink);font-family:var(--mono);
  display:grid;grid-template-columns:272px 1fr;grid-template-rows:52px 40px 1fr;
  grid-template-areas:"top top""tabs tabs""side main";height:100vh;overflow:hidden;}

/* TOPBAR */
.topbar{grid-area:top;background:var(--ink);color:#fff;display:flex;align-items:center;
  padding:0 20px;gap:14px;border-bottom:1px solid #222;}
.logo{font-family:var(--serif);font-style:italic;font-size:1.15rem;}
.logo span{color:var(--accent);}
.divider{width:1px;height:18px;background:#333;}
.toplabel{font-size:.65rem;color:#888;text-transform:uppercase;letter-spacing:.1em;}
.counters{display:flex;gap:18px;margin-left:16px;}
.ctr{text-align:center;}
.ctr-v{font-size:.92rem;font-weight:600;line-height:1;}
.cv-p{color:#4ade80;}.cv-f{color:#f87171;}.cv-n{color:#93c5fd;}
.ctr-l{font-size:.56rem;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}
.env{margin-left:auto;display:flex;align-items:center;gap:7px;}
.envdot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 2s infinite;}
.envlbl{font-size:.62rem;color:var(--accent);text-transform:uppercase;letter-spacing:.12em;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* TAB BAR */
.tabbar{grid-area:tabs;background:#1a1a1a;display:flex;align-items:stretch;
  border-bottom:1px solid #333;padding:0 20px;gap:2px;}
.tab{display:flex;align-items:center;gap:7px;padding:0 18px;cursor:pointer;
  font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:#888;
  border-bottom:2px solid transparent;transition:all .15s;}
.tab:hover{color:#ccc;}
.tab.active-emit{color:#d97706;border-bottom-color:#d97706;}
.tab.active-recv{color:#38bdf8;border-bottom-color:#38bdf8;}
.tab-dot{width:6px;height:6px;border-radius:50%;}
.td-emit{background:#d97706;}
.td-recv{background:#38bdf8;}
.tab-counts{margin-left:auto;display:flex;gap:16px;align-items:center;}
.tc{font-size:.6rem;color:#666;}
.tc span{font-weight:600;}
.tc-p span{color:#4ade80;}
.tc-n span{color:#93c5fd;}

/* SIDEBAR */
.sidebar{grid-area:side;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;}
.s-section{padding:8px 14px 4px;font-size:.56rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:6px;}
.s-section-dot{width:5px;height:5px;border-radius:50%;}
.ss-emit{background:#d97706;}.ss-recv{background:#38bdf8;}
.s-item{padding:8px 14px;border-bottom:1px solid var(--border2);cursor:pointer;
  display:flex;align-items:flex-start;gap:9px;transition:background .1s;}
.s-item:hover{background:#f9f8f5;}
.s-item.active{background:#f0ede7;border-left:3px solid var(--ink);padding-left:11px;}
.s-item.active-r{background:#f0f7ff;border-left:3px solid #0369a1;padding-left:11px;}
.s-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;margin-top:3px;}
.s-dot.pass{background:var(--pass);}.s-dot.fail{background:var(--fail);}
.s-id{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.s-name{font-size:.74rem;color:var(--ink);line-height:1.3;margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-tags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.chip{font-size:.54rem;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:500;}
.c-i{background:#fef9c3;color:#854d0e;}.c-e{background:#fee2e2;color:#991b1b;}
.c-p{background:#ede9fe;color:#5b21b6;}.c-ppd{background:#e0f2fe;color:#075985;}
.c-pue{background:#dcfce7;color:#166534;}.c-x{background:#fce7f3;color:#9d174d;}
.c-r{background:#f3f4f6;color:#374151;}.c-po{background:#fef3c7;color:#92400e;}
.c-3w{background:#d1fae5;color:#065f46;}.c-rx{background:#e0f2fe;color:#075985;}

/* MAIN */
.main{grid-area:main;overflow-y:auto;display:flex;flex-direction:column;}
.detail{padding:20px 24px 40px;flex:1;}

.dh{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;
  padding-bottom:12px;border-bottom:1px solid var(--border);}
.did{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.dtitle{font-family:var(--serif);font-size:1.4rem;line-height:1.1;margin-top:2px;}
.dtitle em{font-style:italic;color:var(--accent);}
.dtitle em.r{color:#0369a1;}
.dactions{margin-left:auto;display:flex;gap:7px;align-items:center;flex-shrink:0;}
.btn{padding:6px 14px;border-radius:6px;font-family:var(--mono);font-size:.72rem;
  cursor:pointer;border:1px solid transparent;display:flex;align-items:center;gap:5px;transition:all .15s;}
.btn-p{background:var(--ink);color:#fff;}.btn-p:hover{background:#333;}
.btn-r{background:#0369a1;color:#fff;}.btn-r:hover{background:#0284c7;}
.btn-s{background:transparent;border-color:var(--border);color:var(--ink2);}
.btn-s:hover{background:#f5f4f0;}
.btn-run{background:var(--accent)!important;color:#fff!important;}
.btn-run-r{background:#0369a1!important;color:#fff!important;}

.desc-text{font-size:.76rem;color:var(--ink2);line-height:1.6;margin-bottom:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}

/* card */
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.card.recv-card{border-color:#bae6fd;}
.ch{padding:8px 13px;border-bottom:1px solid var(--border2);font-size:.58rem;
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted);background:#fafaf8;
  display:flex;align-items:center;gap:7px;}
.ch.rh{background:#f0f9ff;border-color:#bae6fd;color:#0369a1;}
.cb{padding:12px;}

/* kv */
.kv{width:100%;border-collapse:collapse;}
.kv tr{border-bottom:1px solid var(--border2);}
.kv tr:last-child{border-bottom:none;}
.kv td{padding:4px 0;vertical-align:top;}
.kv td:first-child{color:var(--muted);font-size:.62rem;width:44%;text-transform:uppercase;
  letter-spacing:.05em;padding-right:6px;}
.kv td:last-child{font-size:.74rem;color:var(--ink2);}
.vhi{color:var(--ink);font-weight:500;}.vw{color:var(--warn);}
.vf{color:var(--fail);}.vg{color:var(--pass);}.vb{color:var(--blue);}
.vmono{font-family:var(--mono);font-size:.7rem;}

/* items table */
.it{width:100%;border-collapse:collapse;font-size:.7rem;}
.it th{padding:5px 9px;text-align:left;font-size:.56rem;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border);background:#fafaf8;}
.it td{padding:5px 9px;border-bottom:1px solid var(--border2);color:var(--ink2);}
.it tr:last-child td{border-bottom:none;}
.it .r{text-align:right;font-variant-numeric:tabular-nums;}
.tots{padding:8px 13px;background:#fafaf8;border-top:1px solid var(--border);}
.tot-r{display:flex;justify-content:space-between;padding:2px 0;font-size:.73rem;color:var(--ink2);}
.tot-r.grand{font-weight:600;color:var(--ink);border-top:1px solid var(--border);
  margin-top:3px;padding-top:5px;font-size:.8rem;}
.tot-r.red{color:var(--fail);}.tot-r.blu{color:var(--blue);}

/* DOC FLOW */
.doc-flow{display:flex;flex-wrap:wrap;align-items:flex-start;gap:0;
  padding:8px 4px 4px;min-height:170px;}
.doc-node{display:flex;align-items:flex-start;}
.doc-card{background:var(--panel);border:1.5px solid var(--border);border-radius:8px;
  padding:10px 12px;width:172px;flex-shrink:0;
  transition:all .5s cubic-bezier(.22,1,.36,1);
  opacity:.3;transform:translateY(8px) scale(.97);}
.doc-card.emitted{opacity:1;transform:translateY(0) scale(1);box-shadow:0 3px 14px rgba(0,0,0,.07);}
@keyframes glow{0%{box-shadow:0 0 0 0 rgba(217,119,6,.5)}70%{box-shadow:0 0 0 10px rgba(217,119,6,0)}100%{box-shadow:0 0 0 0 rgba(217,119,6,0)}}
@keyframes glow-r{0%{box-shadow:0 0 0 0 rgba(3,105,161,.5)}70%{box-shadow:0 0 0 10px rgba(3,105,161,0)}100%{box-shadow:0 0 0 0 rgba(3,105,161,0)}}
.doc-card.active-emit{animation:glow .7s ease;}
.doc-card.active-recv{animation:glow-r .7s ease;}
.doc-card.t-I{border-top:3px solid #854d0e;}
.doc-card.t-E{border-top:3px solid var(--fail);}
.doc-card.t-P{border-top:3px solid #5b21b6;}
.doc-card.t-X{border-top:3px solid var(--fail);background:var(--fail-bg);}
.doc-card.t-PO{border-top:3px solid #d97706;background:#fffbeb;}
.doc-card.t-RX{border-top:3px solid #0369a1;background:#f0f9ff;}
.dc-type{font-size:.54rem;text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:3px;}
.dc-type.I{color:#854d0e;}.dc-type.E{color:var(--fail);}.dc-type.P{color:#5b21b6;}
.dc-type.X{color:var(--fail);}.dc-type.PO{color:#92400e;}.dc-type.RX{color:#0369a1;}
.dc-folio{font-size:.8rem;font-weight:700;color:var(--ink);margin-bottom:2px;}
.dc-desc{font-size:.62rem;color:var(--muted);line-height:1.3;margin-bottom:4px;}
.dc-amount{font-size:.8rem;font-weight:600;color:var(--ink);}
.dc-amount.neg{color:var(--fail);}
.dc-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;align-items:center;}
.dc-date{font-size:.57rem;color:var(--muted);}
.dc-rel{font-size:.57rem;color:var(--blue);background:var(--blue-bg);
  padding:2px 5px;border-radius:3px;margin-top:3px;line-height:1.4;}
.dc-uuid{font-size:.54rem;color:var(--muted);font-family:var(--mono);
  background:#f0ede8;padding:2px 5px;border-radius:3px;margin-top:3px;
  word-break:break-all;display:none;}
.dc-err{font-size:.62rem;color:var(--fail);margin-top:4px;line-height:1.4;
  background:var(--fail-bg);padding:4px 6px;border-radius:4px;}
.dc-ok{font-size:.62rem;color:var(--pass);margin-top:4px;line-height:1.4;
  background:var(--pass-bg);padding:4px 6px;border-radius:4px;}
.dc-saldo{margin-top:5px;}
.dc-saldo-row{display:flex;justify-content:space-between;font-size:.6rem;
  border-bottom:1px solid var(--border2);padding:2px 0;}
.dc-saldo-row:last-child{border-bottom:none;font-weight:600;}
.dc-saldo-row span:first-child{color:var(--muted);}
.saldo-zero{color:var(--pass)!important;}.saldo-pos{color:var(--warn)!important;}
.doc-arrow{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:32px;flex-shrink:0;padding-top:28px;gap:2px;color:var(--border);transition:color .5s;}
.doc-arrow.lit{color:var(--ink2);}
.doc-arrow.lit-r{color:#0369a1;}
.arr-sym{font-size:.9rem;line-height:1;}
.arr-lbl{font-size:.49rem;color:var(--muted);white-space:nowrap;text-align:center;}

/* 3-way match table */
.match-table{width:100%;border-collapse:collapse;font-size:.72rem;}
.match-table th{padding:5px 9px;text-align:left;font-size:.58rem;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border);background:#fafaf8;}
.match-table td{padding:6px 9px;border-bottom:1px solid var(--border2);color:var(--ink2);}
.match-table tr:last-child td{border-bottom:none;}
.match-ok{color:var(--pass);font-weight:600;}
.match-fail{color:var(--fail);font-weight:600;}
.match-warn{color:var(--warn);font-weight:600;}

/* validations */
.chk-list{display:flex;flex-direction:column;gap:5px;}
.chk-item{display:flex;align-items:flex-start;gap:9px;padding:7px 11px;
  border-radius:6px;border:1px solid var(--border2);background:#fafaf8;transition:all .35s;}
.chk-item.run{background:var(--blue-bg);border-color:#93c5fd;}
.chk-item.pass{background:var(--pass-bg);border-color:var(--pass-bdr);}
.chk-item.fail{background:var(--fail-bg);border-color:var(--fail-bdr);}
.chk-ico{font-size:.85rem;flex-shrink:0;min-width:13px;margin-top:1px;}
.chk-label{font-size:.72rem;color:var(--ink);margin-bottom:1px;}
.chk-d1{font-size:.62rem;color:var(--muted);}
.chk-d2{font-size:.62rem;color:var(--muted);margin-top:1px;line-height:1.35;}
.chk-d1.pm{color:var(--pass);}.chk-d1.fm{color:var(--fail);}

/* result banner */
.rb{display:none;margin-bottom:14px;padding:11px 14px;border-radius:8px;
  border:1px solid;font-size:.76rem;line-height:1.6;}
.rb.pass{background:var(--pass-bg);border-color:var(--pass-bdr);color:var(--pass);display:block;}
.rb.warn{background:var(--warn-bg);border-color:var(--warn-bdr);color:var(--warn);display:block;}
.rb.fail{background:var(--fail-bg);border-color:var(--fail-bdr);color:var(--fail);display:block;}

/* empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--muted);padding:60px;text-align:center;}
.empty h3{font-family:var(--serif);font-style:italic;font-size:1.3rem;color:var(--ink2);}
.empty p{font-size:.76rem;line-height:1.6;max-width:320px;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">CFDI<span>Lab</span></div>
  <div class="divider"></div>
  <div class="toplabel">Portal de Pruebas · Sandbox SAT</div>
  <div class="counters">
    <div class="ctr"><div class="ctr-v cv-p" id="cnt-ep">0</div><div class="ctr-l">Emit·Pass</div></div>
    <div class="ctr"><div class="ctr-v cv-n" id="cnt-en">10</div><div class="ctr-l">Emit·Pend</div></div>
    <div class="divider" style="margin:0 4px"></div>
    <div class="ctr"><div class="ctr-v cv-p" id="cnt-rp">0</div><div class="ctr-l">Recv·Pass</div></div>
    <div class="ctr"><div class="ctr-v cv-f" id="cnt-rf">0</div><div class="ctr-l">Recv·Fail</div></div>

<!-- TAB BAR -->
<nav class="tabbar">
  <div class="tab active-emit" id="tab-emit" onclick="switchTab('emit')">
    <div class="tab-dot td-emit"></div> Emisión de CFDI
  </div>
  <div class="tab" id="tab-recv" onclick="switchTab('recv')">
    <div class="tab-dot td-recv"></div> Recepción de CFDI
  </div>
</nav>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar"></aside>

<!-- MAIN -->
<main class="main" id="mainPanel">
  <div class="empty"><h3>Selecciona un escenario</h3>
  <p>Elige un caso del panel izquierdo para ver el flujo completo de documentos.</p></div>
</main>

// ─────────────────────────────────────────────────────────────────────────
// TAB SWITCH
// ─────────────────────────────────────────────────────────────────────────
function switchTab(tab){
  curTab = tab;
  $('tab-emit').className = 'tab' + (tab==='emit'?' active-emit':'');
  $('tab-recv').className = 'tab' + (tab==='recv'?' active-recv':'');
  renderSidebar();
  $('mainPanel').innerHTML=`<div class="empty"><h3>Selecciona un escenario</h3>
    <p>Elige un caso del panel izquierdo para ver el flujo completo de documentos.</p></div>`;
  curSc = null;
}

// ─────────────────────────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────────────────────────
function renderSidebar(){
  const sb = $('sidebar');
  if(curTab==='emit'){
    const items = Object.entries(EMIT).map(([id,sc])=>{
      const tags = sc.docs.map(d=>{
        const m={I:'<span class="chip c-i">I</span>',E:'<span class="chip c-e">E</span>',
                 P:'<span class="chip c-p">REP</span>',X:'<span class="chip c-x">ERR</span>'};
        return m[d.type]||'';
      }).filter((v,i,a)=>a.indexOf(v)===i).join('');
      const dot = doneE[id] ? 'pass' : '';
      const active = curSc===id ? ' active' : '';
      return `<div class="s-item${active}" onclick="loadSc('${id}')" id="nav-${id}">
        <div class="s-dot ${dot}" id="dot-${id}"></div>
        <div style="flex:1;min-width:0">
          <div class="s-id">${id.replace('SC','SC-')}</div>
          <div class="s-name">${sc.title.replace(/<[^>]+>/g,'')}</div>
          <div class="s-tags">${tags}${sc.neg?'<span class="chip c-x">Negativo</span>':''}</div>
        </div>
      </div>`;
    }).join('');
    sb.innerHTML=`<div class="s-section"><div class="s-section-dot ss-emit"></div>Emisión de CFDI (${Object.keys(EMIT).length})</div>${items}`;
  } else {
    const items = Object.entries(RECV).map(([id,sc])=>{
      const dot = doneR[id] ? (doneR[id]==='pass'?'pass':'fail') : '';
      const active = curSc===id ? ' active-r' : '';
      return `<div class="s-item${active}" onclick="loadSc('${id}')" id="nav-${id}">
        <div class="s-dot ${dot}" id="dot-${id}"></div>
        <div style="flex:1;min-width:0">
          <div class="s-id">${id.replace('RC','RC-')}</div>
          <div class="s-name">${sc.title.replace(/<[^>]+>/g,'')}</div>
          <div class="s-tags">
            <span class="chip c-rx">Recepción</span>
            ${sc.docs.some(d=>d.type==='E')?'<span class="chip c-e">NC</span>':''}
            ${sc.docs.some(d=>d.type==='P')?'<span class="chip c-p">REP</span>':''}
            ${sc.neg?'<span class="chip c-x">Negativo</span>':''}
          </div>
        </div>
      </div>`;
    }).join('');
    sb.innerHTML=`<div class="s-section"><div class="s-section-dot ss-recv"></div>Recepción de CFDI (${Object.keys(RECV).length})</div>${items}`;
  }
}

// ─────────────────────────────────────────────────────────────────────────
// DOC CARD
// ─────────────────────────────────────────────────────────────────────────
function typeLabel(t){
  return {I:'📄 CFDI Ingreso',E:'📄 CFDI Egreso',P:'📄 CFDI Pago',
          X:'⛔ Rechazado / Error',PO:'🛒 Orden de Compra',RX:'📋 Documento interno'}[t]||'';
}

function docCardHtml(scId,d){
  let saldoHtml='';
  if(d.type==='P'&&d.saldoAnt!=null){
    saldoHtml=`<div class="dc-saldo">
      <div class="dc-saldo-row"><span>Saldo ant.</span><span>${fmt(d.saldoAnt)}</span></div>
      <div class="dc-saldo-row"><span>Pagado</span><span class="vg">${fmt(d.pagado)}</span></div>
      <div class="dc-saldo-row"><span>Insoluto</span><span class="${d.saldoIns>0?'saldo-pos':'saldo-zero'}">${fmt(d.saldoIns)}</span></div>
      ${d.nota?`<div style="font-size:.56rem;color:var(--blue);margin-top:3px;line-height:1.3">${d.nota}</div>`:''}
    </div>`;
  }
  let totHtml='';
  if(['I','E'].includes(d.type)&&d.subtotal!=null){
    totHtml=`<div style="margin-top:5px;border-top:1px solid var(--border2);padding-top:4px">
      <div style="font-size:.6rem;color:var(--muted)">Sub: ${fmt(d.subtotal)}</div>
      ${d.retISR?`<div style="font-size:.6rem;color:var(--fail)">Ret.ISR: −${fmt(d.retISR)}</div>`:''}
      ${d.retIVA?`<div style="font-size:.6rem;color:var(--fail)">Ret.IVA: −${fmt(d.retIVA)}</div>`:''}
      <div style="font-size:.76rem;font-weight:600;color:${d.type==='E'?'var(--fail)':'var(--ink)'}">Total: ${fmt(d.total)}</div>
    </div>`;
  }
  if(['PO'].includes(d.type)&&d.subtotal!=null){
    totHtml=`<div style="margin-top:5px;border-top:1px solid var(--border2);padding-top:4px">
      <div style="font-size:.76rem;font-weight:600;color:var(--ink)">Total: ${fmt(d.total)}</div>
    </div>`;
  }
  if(d.type==='P'&&d.total!=null&&!d.saldoAnt){
    totHtml=`<div style="margin-top:5px"><div style="font-size:.76rem;font-weight:600">Monto: ${fmt(d.total)}</div></div>`;
  }
  const relHtml = d.relacion?`<div class="dc-rel">🔗 ${d.relacion.tipo}<br><strong>${d.relacion.ref}</strong></div>`:'';
  const errHtml = d.error?`<div class="dc-err">${d.error}</div>`:'';
  const okHtml  = d.ok?`<div class="dc-ok">${d.ok}</div>`:'';
  const mHtml = d.method?`<div class="dc-meta"><span class="chip ${d.method==='PPD'?'c-ppd':'c-pue'}">${d.method}</span></div>`:'';

  return `<div class="doc-card t-${d.type}" id="dc-${scId}-${d.id}">
    <div class="dc-type ${d.type}">${typeLabel(d.type)}</div>
    <div class="dc-folio">${d.folio}</div>
    <div class="dc-desc">${d.desc}</div>
    <div class="dc-meta"><span class="dc-date">📅 ${d.date}</span></div>
    ${mHtml}${saldoHtml}${totHtml}${relHtml}${errHtml}${okHtml}
    <div class="dc-uuid" id="uuid-${scId}-${d.id}"></div>
  </div>`;
}

function arrowHtml(scId,d,i){
  if(i===0) return '';
  const lbl = d.relacion?d.relacion.tipo.split(' - ')[0]:'→';
  return `<div class="doc-arrow" id="arr-${scId}-${i}"><div class="arr-sym">→</div><div class="arr-lbl">${lbl}</div></div>`;
}

// ─────────────────────────────────────────────────────────────────────────
// LOAD SCENARIO
// ─────────────────────────────────────────────────────────────────────────
function loadSc(id){
  curSc = id;
  const isE = id.startsWith('SC');
  const sc = isE ? EMIT[id] : RECV[id];

  renderSidebar(); // re-render to update active state

  let flowHtml='';
  sc.docs.forEach((d,i)=>{
    flowHtml += arrowHtml(id,d,i);
    flowHtml += `<div class="doc-node">${docCardHtml(id,d)}</div>`;
  });

  let valHtml='';
  sc.validations.forEach(v=>{
    valHtml+=`<div class="chk-item" id="chk-${id}-${v.id}">
      <div class="chk-ico">○</div>
      <div>
        <div class="chk-label">${v.label}</div>
        <div class="chk-d1" id="chkd1-${id}-${v.id}">Campo: <strong>${v.field}</strong> · Esperado: <strong>${v.exp}</strong></div>
        <div class="chk-d2">${v.note}</div>
      </div>
    </div>`;
  });

  const d0 = sc.docs.find(d=>d.conceptos&&d.conceptos.length>0)||sc.docs[0];
  const concHtml = d0.conceptos&&d0.conceptos.length>0 ? d0.conceptos.map(c=>`<tr>
    <td>${c.d}</td><td>${c.cp}</td><td>${c.u}</td>
    <td class="r">${c.q}</td><td class="r">${fmt(c.p)}</td>
    <td class="r">${fmt(c.imp)}</td><td class="r">${fmt(c.iva)}</td>
  </tr>`).join('') : `<tr><td colspan="7" style="color:var(--muted);text-align:center;padding:12px">Sin conceptos de factura en este documento</td></tr>`;

  const matchHtml = sc.match ? `
  <div class="card" style="margin-bottom:12px">
    <div class="ch ${isE?'':'rh'}">🔍 Resultado 3-Way Match — PO vs Factura</div>
    <table class="match-table">
      <thead><tr><th>Campo</th><th>Orden de Compra</th><th>Factura recibida</th><th>Resultado</th></tr></thead>
      <tbody>${sc.match.map(m=>`<tr>
        <td>${m.campo}</td><td>${m.po}</td><td>${m.fac}</td>
        <td class="match-${m.result}">${{ok:'✓ OK',fail:'✗ Discrepancia',warn:'⚠ Revisar'}[m.result]}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>` : '';

  const negBadge = sc.neg?'<span class="chip c-x" style="font-size:.65rem;padding:2px 7px;margin-left:6px">Prueba negativa</span>':'';
  const isRecv = !isE;
  const btnClass = isRecv ? 'btn-r' : 'btn-p';
  const runFn = isRecv ? `runRecv('${id}')` : `runEmit('${id}')`;
  const party1 = isE ?
    `<div class="card"><div class="ch">🏭 Emisor</div><div class="cb"><table class="kv">
      <tr><td>RFC</td><td class="vmono vhi ${sc.emisor.rfc==='RFC-INCORRECTO'?'vf':''}">${sc.emisor.rfc}</td></tr>
      <tr><td>Razón Social</td><td>${sc.emisor.razon}</td></tr>
      <tr><td>Régimen</td><td>${sc.emisor.reg}</td></tr>
    </table></div></div>` :
    `<div class="card recv-card"><div class="ch rh">🏢 Receptor (nosotros)</div><div class="cb"><table class="kv">
      <tr><td>RFC</td><td class="vmono vhi">${sc.receptor.rfc}</td></tr>
      <tr><td>Razón Social</td><td>${sc.receptor.razon}</td></tr>
      <tr><td>Área</td><td>${sc.receptor.area}</td></tr>
    </table></div></div>`;
  const party2 = isE ?
    `<div class="card"><div class="ch">🏢 Receptor</div><div class="cb"><table class="kv">
      <tr><td>RFC</td><td class="vmono vhi">${sc.receptor.rfc}</td></tr>
      <tr><td>Razón Social</td><td>${sc.receptor.razon}</td></tr>
      <tr><td>Uso CFDI</td><td>${sc.receptor.uso}</td></tr>
      <tr><td>C.P.</td><td>${sc.receptor.cp}</td></tr>
    </table></div></div>` :
    `<div class="card recv-card"><div class="ch rh">🏭 Proveedor (ellos emiten)</div><div class="cb"><table class="kv">
      <tr><td>RFC</td><td class="vmono vhi">${sc.proveedor.rfc}</td></tr>
      <tr><td>Razón Social</td><td>${sc.proveedor.razon}</td></tr>
      <tr><td>Cond. Pago</td><td>${sc.proveedor.condPago}</td></tr>
    </table></div></div>`;

  $('mainPanel').innerHTML = `
  <div class="detail">
    <div id="rb-${id}" class="rb"></div>
    <div class="dh">
      <div>
        <div class="did">${id.replace('SC','SC-').replace('RC','RC-')}${negBadge} · ${isE?'Emisión':'Recepción'}</div>
        <div class="dtitle">${sc.title.replace(/<em>/g, isE ? '<em>' : '<em class="r">')}  </div>
      </div>
      <div class="dactions">
        <button class="btn btn-s" onclick="resetSc('${id}')">↺ Limpiar</button>
        <button class="btn ${btnClass}" id="runbtn-${id}" onclick="${runFn}">▶ Ejecutar flujo</button>
      </div>
    </div>
    <p class="desc-text">${sc.desc}</p>
    <div class="g2" style="margin-bottom:12px">${party1}${party2}</div>
    <div class="card" style="margin-bottom:12px;border-color:${isE?'var(--border)':'#bae6fd'}">
      <div class="ch ${isE?'':'rh'}">🔄 Flujo completo — ${sc.docs.length} documentos en este escenario</div>
      <div class="cb" style="overflow-x:auto;padding-bottom:14px"><div class="doc-flow">${flowHtml}</div></div>
    </div>
    ${matchHtml}
    <div class="card" style="margin-bottom:12px">
      <div class="ch ${isE?'':'rh'}">📦 Conceptos — ${d0.folio}</div>
      <table class="it"><thead><tr><th>Descripción</th><th>Clave SAT</th><th>Unidad</th>
        <th class="r">Cant</th><th class="r">P.Unit</th><th class="r">Importe</th><th class="r">IVA</th>
      </tr></thead><tbody>${concHtml}</tbody></table>
      ${d0.subtotal?`<div class="tots">
        <div class="tot-r"><span>Subtotal</span><span>${fmt(d0.subtotal)}</span></div>
        <div class="tot-r blu"><span>IVA 16%</span><span>+${fmt(d0.iva)}</span></div>
        ${d0.retISR?`<div class="tot-r red"><span>Ret. ISR</span><span>−${fmt(d0.retISR)}</span></div>`:''}
        ${d0.retIVA?`<div class="tot-r red"><span>Ret. IVA</span><span>−${fmt(d0.retIVA)}</span></div>`:''}
        <div class="tot-r grand"><span>Total</span><span>${fmt(d0.total)}</span></div>
      </div>`:''}
    </div>
    <div class="card ${isE?'':'recv-card'}">
      <div class="ch ${isE?'':'rh'}">✅ Validaciones — ${sc.validations.length} puntos de control</div>
      <div class="cb"><div class="chk-list">${valHtml}</div></div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────
// RUN — EMISIÓN
// ─────────────────────────────────────────────────────────────────────────
function runEmit(id){
  const sc = EMIT[id];
  const btn = $(`runbtn-${id}`);
  btn.textContent='⟳ Emitiendo...'; btn.className='btn btn-run'; btn.disabled=true;
  emitUuids[id]={};
  sc.docs.forEach(d=>{
    const el=$(`dc-${id}-${d.id}`); if(el){el.classList.remove('emitted','active-emit');}
    const uel=$(`uuid-${id}-${d.id}`); if(uel){uel.textContent='';uel.style.display='none';}
  });
  sc.docs.forEach((d,i)=>{
    setTimeout(()=>{
      const el=$(`dc-${id}-${d.id}`); const arr=$(`arr-${id}-${i}`);
      if(!el) return;
      el.classList.add('active-emit');
      setTimeout(()=>{
        el.classList.remove('active-emit'); el.classList.add('emitted');
        if(arr) arr.classList.add('lit');
        if(d.type!=='X'){
          const u=mkUuid(); emitUuids[id][d.id]=u;
          const uel=$(`uuid-${id}-${d.id}`);
          if(uel){uel.style.display='block';uel.textContent='🔏 '+u.slice(0,24)+'...';}
        }
      },600);
    },i*1100);
  });
  const valStart=sc.docs.length*1100+600;
  sc.validations.forEach((v,i)=>{
    setTimeout(()=>{const el=$(`chk-${id}-${v.id}`);if(el){el.className='chk-item run';el.querySelector('.chk-ico').textContent='◌';}},valStart+i*340);
    setTimeout(()=>{
      const el=$(`chk-${id}-${v.id}`); if(!el) return;
      el.className='chk-item pass'; el.querySelector('.chk-ico').textContent='✓';
      const d1=$(`chkd1-${id}-${v.id}`); if(d1) d1.className='chk-d1 pm';
      if(i===sc.validations.length-1) setTimeout(()=>finishEmit(id,sc),400);
    },valStart+i*340+320);
  });
}

function finishEmit(id,sc){
  const btn=$(`runbtn-${id}`); const rb=$(`rb-${id}`);
  btn.textContent='✓ Completado'; btn.className='btn btn-p'; btn.disabled=false;
  if(sc.neg){
    rb.className='rb warn';
    rb.innerHTML='<strong>⚠️ Prueba negativa — APROBADA.</strong> El portal detectó y rechazó la operación inválida. Ningún UUID generado para el doc erróneo.';
  } else {
    const lines=sc.docs.filter(d=>d.type!=='X').map((d,i)=>
      `<span style="font-family:monospace;font-size:.68rem;display:block"><strong>${d.folio}</strong>: ${emitUuids[id][d.id]||'—'}</span>`).join('');
    rb.className='rb pass';
    rb.innerHTML=`<strong>✓ ${sc.docs.filter(d=>d.type!=='X').length} CFDI emitidos exitosamente.</strong><br>${lines}`;
  }
  if(!doneE[id]){doneE[id]='pass';cntsE.p++;cntsE.n--;
    $('cnt-ep').textContent=cntsE.p;$('cnt-en').textContent=cntsE.n;
    $(`dot-${id}`).className='s-dot pass';}
}

// ─────────────────────────────────────────────────────────────────────────
// RUN — RECEPCIÓN
// ─────────────────────────────────────────────────────────────────────────
function runRecv(id){
  const sc = RECV[id];
  const btn=$(`runbtn-${id}`);
  btn.textContent='⟳ Procesando...'; btn.className='btn btn-run-r'; btn.disabled=true;
  sc.docs.forEach(d=>{
    const el=$(`dc-${id}-${d.id}`); if(el){el.classList.remove('emitted','active-emit','active-recv');}
  });
  sc.docs.forEach((d,i)=>{
    setTimeout(()=>{
      const el=$(`dc-${id}-${d.id}`); const arr=$(`arr-${id}-${i}`);
      if(!el) return;
      el.classList.add(d.type==='X'?'active-emit':'active-recv');
      setTimeout(()=>{
        el.classList.remove('active-emit','active-recv'); el.classList.add('emitted');
        if(arr) arr.classList.add(d.type==='X'?'lit':'lit-r');
        if(['I','E','P'].includes(d.type)){
          const u=mkUuid();
          const uel=$(`uuid-${id}-${d.id}`);
          if(uel){uel.style.display='block';uel.textContent='🔏 '+u.slice(0,24)+'...';}
        }
      },600);
    },i*1100);
  });
  const valStart=sc.docs.length*1100+600;
  sc.validations.forEach((v,i)=>{
    setTimeout(()=>{const el=$(`chk-${id}-${v.id}`);if(el){el.className='chk-item run';el.querySelector('.chk-ico').textContent='◌';}},valStart+i*340);
    setTimeout(()=>{
      const el=$(`chk-${id}-${v.id}`); if(!el) return;
      el.className='chk-item pass'; el.querySelector('.chk-ico').textContent='✓';
      const d1=$(`chkd1-${id}-${v.id}`); if(d1) d1.className='chk-d1 pm';
      if(i===sc.validations.length-1) setTimeout(()=>finishRecv(id,sc),400);
    },valStart+i*340+320);
  });
}

function finishRecv(id,sc){
  const btn=$(`runbtn-${id}`); const rb=$(`rb-${id}`);
  btn.textContent='✓ Completado'; btn.className='btn btn-r'; btn.disabled=false;
  if(sc.neg){
    rb.className='rb warn';
    rb.innerHTML='<strong>⚠️ Prueba negativa — APROBADA.</strong> El sistema receptor detectó y rechazó correctamente el documento inválido. Ningún registro alterado.';
  } else {
    rb.className='rb pass';
    rb.innerHTML=`<strong>✓ Flujo de recepción completado.</strong> Todos los documentos procesados y validados. Partidas contables actualizadas correctamente.`;
  }
  if(!doneR[id]){
    const result=sc.neg?'pass':'pass';
    doneR[id]=result;
    if(result==='pass'){cntsR.p++;} else {cntsR.f++;}
    cntsR.n--;
    $('cnt-rp').textContent=cntsR.p;$('cnt-rf').textContent=cntsR.f;$('cnt-rn').textContent=cntsR.n;
    $(`dot-${id}`).className='s-dot pass';
  }
}

function resetSc(id){
  const isE=id.startsWith('SC');
  if(isE&&doneE[id]){delete doneE[id];cntsE.p--;cntsE.n++;
    $('cnt-ep').textContent=cntsE.p;$('cnt-en').textContent=cntsE.n;}
  if(!isE&&doneR[id]){
    if(doneR[id]==='pass') cntsR.p--; else cntsR.f--;
    delete doneR[id]; cntsR.n++;
    $('cnt-rp').textContent=cntsR.p;$('cnt-rf').textContent=cntsR.f;$('cnt-rn').textContent=cntsR.n;}
  loadSc(id);
}

// ─── INIT ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{ renderSidebar(); loadSc('SC01'); });
</script>
